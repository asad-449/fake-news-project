<!DOCTYPE html>
<html>
<head>
  <title>AI Fake News Detector Pro</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 25px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .container {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }

    button {
      margin-top: 12px;
      padding: 10px 20px;
      border: none;
      background: #38bdf8;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    #result {
      margin-top: 15px;
    }

    .stat {
      background: #334155;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
    }

    .fake { color: #ef4444; }
    .real { color: #22c55e; }

  </style>
</head>

<body>

<h1>🤖 AI Fake News Detector Pro</h1>

<div class="container">

  <!-- INPUT -->
  <div class="box">
    <h3>Analyze News</h3>
    <input type="text" id="newsInput" placeholder="Enter news text...">
    <br>
    <button onclick="checkNews()">Analyze</button>

    <div id="result"></div>
  </div>

  <!-- DASHBOARD -->
  <div class="box">
    <h3>📊 Dashboard</h3>

    <div class="stat">Total: <span id="total">0</span></div>
    <div class="stat fake">Fake: <span id="fake">0</span></div>
    <div class="stat real">Real: <span id="real">0</span></div>

    <canvas id="myChart"></canvas>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
