<!DOCTYPE html>
<html>
<head>
  <title>AI News Detector</title>

  <style>
    body {
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont;
      background:#0b1220;
      color:white;
      display:flex;
      flex-direction:column;
      height:100vh;
    }

    .header {
      padding:15px;
      text-align:center;
      border-bottom:1px solid rgba(255,255,255,0.1);
      font-weight:600;
    }

    .chat {
      flex:1;
      padding:20px;
      overflow-y:auto;
    }

    .msg {
      max-width:70%;
      padding:12px;
      margin:10px 0;
      border-radius:12px;
    }

    .user {
      background:#2563eb;
      margin-left:auto;
    }

    .bot {
      background:rgba(255,255,255,0.08);
    }

    .input-box {
      display:flex;
      padding:15px;
      border-top:1px solid rgba(255,255,255,0.1);
    }

    input {
      flex:1;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#1e293b;
      color:white;
    }

    button {
      margin-left:10px;
      padding:12px 18px;
      border:none;
      border-radius:10px;
      background:#6366f1;
      color:white;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="header">🧠 AI Fake News Detector</div>

<div class="chat" id="chat"></div>

<div class="input-box">
  <input id="newsInput" placeholder="Type news here...">
  <button onclick="checkNews()">Send</button>
</div>

<script src="script.js"></script>

</body>
</html>
