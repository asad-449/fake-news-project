<!DOCTYPE html>
<html>
<head>
  <title>AI Fake News Detector</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: #1e293b;
      padding: 25px;
      border-radius: 15px;
      width: 400px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input {
      width: 90%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 8px;
      border: none;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <h1>🤖 AI Fake News Detector</h1>

  <div class="box">
    <input type="text" id="newsInput" placeholder="Enter news text...">
    <br>
    <button onclick="checkNews()">Analyze with AI</button>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>

</body>
</html>
