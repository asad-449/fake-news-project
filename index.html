<!DOCTYPE html>
<html>
<button onclick="startVoice()">🎤</button>
<head>
  <title>AI News Detector</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* GLASS CONTAINER */
    .container {
      width: 420px;
      height: 600px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(25px);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-weight: 600;
      background: rgba(255,255,255,0.03);
    }

    /* CHAT AREA */
    .chat {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .msg {
      max-width: 75%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 12px;
      animation: fadeIn 0.3s ease;
    }

    .user {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      margin-left: auto;
    }

    .bot {
      background: rgba(255,255,255,0.08);
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* INPUT AREA */
    .input-box {
      display: flex;
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: rgba(0,0,0,0.3);
      color: white;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

  </style>
</head>

<body>

<div class="container">

  <div class="header">
    🧠 AI News Detector
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-box">
    <input id="newsInput" placeholder="Type or paste news...">
    <button onclick="checkNews()">Send</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
