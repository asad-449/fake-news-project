<!DOCTYPE html>
<html>
<head>
  <title>AI News Detector Pro+</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg1: #050816;
      --bg2: #0b1220;
      --glass: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.1);
      --primary: #7c3aed;
      --accent: #22c55e;
      --danger: #ef4444;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
      background: radial-gradient(circle at top, var(--bg2), var(--bg1));
      color: white;
      overflow-x: hidden;
    }

    /* HEADER */
    .header {
      text-align: center;
      padding: 30px 10px;
    }

    .header h1 {
      font-size: 28px;
      margin: 0;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      opacity: 0.6;
      margin-top: 8px;
    }

    /* LAYOUT */
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      padding: 20px 40px;
    }

    /* GLASS CARD */
    .card {
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(25px);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    /* INPUT */
    input {
      width: 95%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.2);
      color: white;
      outline: none;
      font-size: 14px;
    }

    button {
      margin-top: 12px;
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    /* RESULT */
    #result {
      margin-top: 15px;
      font-size: 15px;
      line-height: 1.6;
    }

    /* DASHBOARD */
    .stat {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 12px;
      margin: 10px 0;
      display: flex;
      justify-content: space-between;
    }

    .fake { color: var(--danger); }
    .real { color: var(--accent); }

    /* MOBILE */
    @media(max-width: 900px){
      .container{
        grid-template-columns: 1fr;
        padding: 10px;
      }
    }

  </style>
</head>

<body>

<div class="header">
  <h1>🤖 AI Fake News Detector Pro+</h1>
  <p>Next-gen AI powered fact checking system</p>
</div>

<div class="container">

  <!-- INPUT CARD -->
  <div class="card">
    <h3>🔍 Analyze News</h3>

    <input type="text" id="newsInput" placeholder="Enter news text...">

    <button onclick="checkNews()">Analyze with AI</button>

    <div id="result"></div>
  </div>

  <!-- DASHBOARD CARD -->
  <div class="card">
    <h3>📊 Live Analytics</h3>

    <div class="stat">
      <span>Total Checks</span>
      <span id="total">0</span>
    </div>

    <div class="stat fake">
      <span>Fake News</span>
      <span id="fake">0</span>
    </div>

    <div class="stat real">
      <span>Real News</span>
      <span id="real">0</span>
    </div>

    <canvas id="myChart"></canvas>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
