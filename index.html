<!DOCTYPE html>
<html>
<head>
  <title>AI Fake News Detector</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
    }

    body {
      background: radial-gradient(circle at top, #0b1220, #050816);
      color: white;
      min-height: 100vh;
    }

    /* NAV */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 18px 40px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-weight: 700;
      color: #60a5fa;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 70px 20px 30px;
    }

    .hero h1 {
      font-size: 34px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      margin-top: 10px;
      opacity: 0.7;
    }

    /* CARD */
    .card {
      width: 420px;
      margin: auto;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 22px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      margin-top: 12px;
      outline: none;
      background: rgba(0,0,0,0.3);
      color: white;
    }

    button {
      margin-top: 14px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
    }

    #result {
      margin-top: 18px;
      font-size: 15px;
      line-height: 1.6;
    }

    .fake { color: #ef4444; }
    .real { color: #22c55e; }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 30px;
      opacity: 0.5;
      font-size: 13px;
      margin-top: 40px;
    }

  </style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div class="logo">🧠 AI News Detector</div>
  <div>AI Powered</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Detect Fake News with AI</h1>
  <p>Smart real-time fact-checking engine powered by AI</p>
</div>

<!-- MAIN CARD -->
<div class="card">

  <h3>🔍 Analyze News</h3>

  <input type="text" id="newsInput" placeholder="Paste news text here...">

  <button onclick="checkNews()">Analyze with AI</button>

  <div id="result"></div>

</div>

<!-- FOOTER -->
<div class="footer">
  Built with AI • Fake News Detection System
</div>

<script src="script.js"></script>

</body>
</html>
