<!DOCTYPE html>
<html>
<head>
  <title>AI Fake News Detector</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: #020617;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 16px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
    }

    .logo {
      font-weight: 700;
      color: #6366f1;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 80px 20px 40px;
    }

    .hero h1 {
      font-size: 36px;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      opacity: 0.7;
    }

    /* TOOL */
    .tool-box {
      max-width: 600px;
      margin: auto;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: rgba(0,0,0,0.4);
      color: white;
      outline: none;
      resize: none;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      cursor: pointer;
    }

    #result {
      margin-top: 15px;
      line-height: 1.6;
    }

    /* 🔥 Reasons UI */
    .reasons-container {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .reason-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
    }

    /* FEATURES */
    .features {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 60px auto;
      flex-wrap: wrap;
    }

    .feature {
      background: rgba(255,255,255,0.04);
      padding: 20px;
      border-radius: 14px;
      width: 260px;
    }

    .footer {
      text-align: center;
      padding: 30px;
      opacity: 0.5;
    }

  </style>
</head>

<body>

<div class="navbar">
  <div class="logo">🧠 AI Detector</div>
</div>

<div class="hero">
  <h1>Detect Fake News with AI</h1>
  <p>Analyze news instantly using AI</p>
</div>

<div class="tool-box">

  <textarea id="newsInput" placeholder="Paste news text here..."></textarea>

  <div class="buttons">
    <button onclick="checkNews()">Analyze</button>
    <button onclick="startVoice()">🎤 Voice</button>
  </div>

  <div id="result"></div>

</div>

<div class="features">
  <div class="feature">⚡ Fast Detection</div>
  <div class="feature">🤖 AI Explanation</div>
  <div class="feature">🎤 Voice Input</div>
</div>

<div class="footer">Built with AI</div>

<script src="script.js"></script>

</body>
</html>
